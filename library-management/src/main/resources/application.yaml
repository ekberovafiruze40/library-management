spring:
  application:
    name: library-management

  datasource:
      url: jdbc:postgresql://localhost:5432/library_db
      username: postgres
      password: 123456
      driver-class-name: org.postgresql.Driver

  jpa:
        show-sql: true
        hibernate:
          ddl-auto: update
          properties:
            hibernate:
              dialect: org.hibernate.dialect.PostgreSQLDialect